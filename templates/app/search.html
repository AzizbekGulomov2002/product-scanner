<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qidirish</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #fff; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .back { color: #94a3b8; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 20px; }
    .search-box { display: flex; gap: 10px; margin-bottom: 24px; }
    input {
      flex: 1; padding: 14px 16px; border: 1px solid #334155; border-radius: 10px;
      background: #1e293b; color: #fff; font-size: 1rem;
    }
    button {
      padding: 14px 24px; background: #2563eb; color: #fff; border: none;
      border-radius: 10px; font-weight: 600; cursor: pointer;
    }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 20px; margin-bottom: 16px;
    }
    .card h2 { font-size: 1.2rem; margin-bottom: 8px; color: #22c55e; }
    .meta { color: #94a3b8; font-size: 0.9rem; line-height: 1.8; }
    .images { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 16px; }
    .images img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }
    .empty { text-align: center; color: #64748b; padding: 40px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Bosh sahifa</a>
    <h1>ID / Nom bo'yicha qidirish</h1>

    <div class="search-box">
      <input type="text" id="query" placeholder="ID yoki nom kiriting..." autofocus>
      <button onclick="doSearch()">Qidirish</button>
    </div>

    <div id="result"></div>
    <div id="empty" class="empty hidden">Mahsulot topilmadi</div>
  </div>

  <script>
    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const q = document.getElementById('query').value.trim();
      if (!q) return;

      const resp = await fetch('/api/products/lookup/?q=' + encodeURIComponent(q));
      const data = await resp.json();

      const resultEl = document.getElementById('result');
      const emptyEl = document.getElementById('empty');

      if (!data.found || !data.products.length) {
        resultEl.innerHTML = '';
        emptyEl.classList.remove('hidden');
        return;
      }

      emptyEl.classList.add('hidden');
      resultEl.innerHTML = data.products.map(p => `
        <div class="card">
          <h2>${p.name}</h2>
          <div class="meta">
            <div>🆔 ID: <strong>${p.external_id}</strong></div>
            <div>📊 Barcode: <strong>${p.barcode || '—'}</strong></div>
          </div>
          <div class="images">
            ${(p.images || []).map(img => `<img src="${img.image_url || img.image}" alt="">`).join('')}
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
