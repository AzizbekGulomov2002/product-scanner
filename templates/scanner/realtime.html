<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Kamera skanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
    }
    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      height: 100vh;
      overflow: hidden;
    }
    .top-bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      padding-top: max(10px, env(safe-area-inset-top));
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid #1e293b;
      z-index: 10;
    }
    .top-bar a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .top-bar h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
    }
    .scanner-wrap {
      flex: 1 1 auto;
      position: relative;
      min-height: 0;
      background: #000;
      overflow: hidden;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .scan-frame {
      position: absolute;
      left: 15%;
      top: 20%;
      width: 70%;
      height: 55%;
      border: 2px dashed rgba(34, 197, 94, 0.8);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
    }
    .scan-hint {
      position: absolute;
      left: 15%;
      top: calc(20% - 26px);
      width: 70%;
      text-align: center;
      font-size: 0.8rem;
      color: #bbf7d0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
    .scan-line {
      position: absolute;
      left: 15%;
      right: 15%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      animation: scan 2.2s linear infinite;
    }
    @keyframes scan {
      0% { top: 22%; }
      50% { top: 73%; }
      100% { top: 22%; }
    }
    .result-box {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px 16px;
      backdrop-filter: blur(8px);
    }
    .result-box.hidden { opacity: 0; }
    .result-name { font-size: 1.15rem; font-weight: 700; color: #22c55e; }
    .result-id { font-size: 0.9rem; color: #94a3b8; margin-top: 4px; }
    .result-confidence { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
    .result-status {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 8px;
    }
    .status-found { background: #166534; color: #bbf7d0; }
    .status-probable { background: #854d0e; color: #fef08a; }
    .status-not-found { background: #7f1d1d; color: #fecaca; }
    .bottom-bar {
      flex: 0 0 auto;
      padding: 12px 14px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(15, 23, 42, 0.95);
      border-top: 1px solid #1e293b;
      text-align: center;
    }
    .btn-stop {
      width: 100%;
      max-width: 320px;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: #dc2626;
      color: #fff;
    }
    canvas { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <a href="/">← Bosh sahifa</a>
      <h1>Kamera skanner</h1>
      <span style="width:72px;"></span>
    </header>

    <div class="scanner-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div id="overlay">
        <div class="scan-frame"></div>
        <div class="scan-hint">Mahsulotni yashil ramka ichiga qo'ying</div>
        <div class="scan-line" id="scanLine"></div>
        <div class="result-box hidden" id="resultBox">
          <div class="result-name" id="resultName">—</div>
          <div class="result-id" id="resultId">ID: —</div>
          <div class="result-confidence" id="resultConfidence"></div>
          <span class="result-status" id="resultStatus"></span>
        </div>
      </div>
    </div>

    <footer class="bottom-bar">
      <button class="btn-stop" id="stopBtn">Bosh sahifa</button>
    </footer>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const stopBtn = document.getElementById('stopBtn');
    const resultBox = document.getElementById('resultBox');
    const scanLine = document.getElementById('scanLine');

    let stream = null;
    let scanInterval = null;
    let isScanning = false;
    let stableId = null;
    let stableCount = 0;
    let barcodeDetector = null;

    const STABLE_FRAMES = 2;

    if ('BarcodeDetector' in window) {
      try {
        barcodeDetector = new BarcodeDetector({
          formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'qr_code'],
        });
      } catch (e) {
        barcodeDetector = null;
      }
    }

    async function detectBarcodeFromVideo() {
      if (!barcodeDetector || !video.videoWidth) return null;
      try {
        const codes = await barcodeDetector.detect(video);
        if (codes.length) return codes[0].rawValue;
      } catch (e) {
        /* ignore */
      }
      return null;
    }

    stopBtn.addEventListener('click', stopCamera);

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        scanLine.style.display = 'block';
        scanInterval = setInterval(scanFrame, 1000);
      } catch (err) {
        alert('Kameraga ruxsat berilmadi: ' + err.message);
      }
    }

    function stopCamera() {
      if (scanInterval) clearInterval(scanInterval);
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null;
      window.location.href = '/';
    }

    async function scanFrame() {
      if (isScanning || !video.videoWidth) return;
      isScanning = true;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const frame = canvas.toDataURL('image/jpeg', 0.92);
      const detectedBarcode = await detectBarcodeFromVideo();

      try {
        const resp = await fetch('/api/search/realtime/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            frame,
            barcode: detectedBarcode || '',
          }),
        });
        if (!resp.ok) return;
        showResult(await resp.json());
      } catch (err) {
        console.error(err);
      }

      isScanning = false;
    }

    function showResult(data) {
      const match = (data.matches && data.matches[0]) || null;

      if (!match || data.status === 'not_found') {
        stableId = null;
        stableCount = 0;
        resultBox.classList.remove('hidden');
        if (data.detected_barcode && data.method === 'barcode') {
          document.getElementById('resultName').textContent = 'Barcode bazada yo\'q';
          document.getElementById('resultId').textContent = 'Barcode: ' + data.detected_barcode;
          document.getElementById('resultConfidence').textContent = 'Admin panelda shu barcode bilan mahsulot qo\'shing';
        } else {
          document.getElementById('resultName').textContent = 'Mahsulot topilmadi';
          document.getElementById('resultId').textContent = data.detected_barcode ? 'Barcode: ' + data.detected_barcode : 'ID: —';
          document.getElementById('resultConfidence').textContent =
            data.confidence_percent ? 'Eng yaqin: ' + data.confidence_percent + '%' : '';
        }
        const statusEl = document.getElementById('resultStatus');
        statusEl.textContent = data.method === 'barcode' ? 'Barcode o\'qildi' : 'Aniq emas';
        statusEl.className = 'result-status status-not-found';
        return;
      }

      if (data.method !== 'barcode') {
        if (match.external_id === stableId) {
          stableCount += 1;
        } else {
          stableId = match.external_id;
          stableCount = 1;
        }
        if (data.status === 'probable' && stableCount < STABLE_FRAMES) {
          return;
        }
      }

      resultBox.classList.remove('hidden');
      document.getElementById('resultName').textContent = match.name;
      document.getElementById('resultId').textContent = 'ID: ' + match.external_id + (match.barcode ? ' | Barcode: ' + match.barcode : '');
      document.getElementById('resultConfidence').textContent =
        data.method === 'barcode'
          ? 'Barcode orqali topildi (100%)'
          : 'Moslik: ' + match.similarity_percent + '%';

      const statusEl = document.getElementById('resultStatus');
      statusEl.textContent = 'Topildi';
      statusEl.className = 'result-status status-found';
    }

    startCamera();
  </script>
</body>
</html>
